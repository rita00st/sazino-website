<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
    <title>login </title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            
        }

        .bd-placeholder-img {
            font-size: 1.125rem;
            text-anchor: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }

        @media (min-width: 768px) {
            .bd-placeholder-img-lg {
            font-size: 3.5rem;
            }
        } 
            


       .btn:hover{
          transform: scale(0.97);
          transition:.3s all ;
       }     

       p > a{
        text-decoration: none;
        color: #93111e;
        
       }
        p > a:hover{
        color: #15ff00da;
       }

       .checkbox-custom{
        accent-color: #dd3333ce;
        width: 16px;
        height: 16px;
        cursor: pointer;
        vertical-align: middle;
      }
    </style>
</head>
<body class="text-center d-flex justify-content-center align-items-center" style="background: url(./img/bgPic.jpg)no-repeat center center /cover ;">
<main class="container  " style="max-width: 450px; ">
  <form class="border-0 box-shadow p-4  " style="border-radius: 15px; background:linear-gradient(#f1d3bac2,#e45f2bce); ">
    <div class=" rounded-circle text-white d-flex justify-content-center align-items-center  mx-auto" style="width: 120px; height: 120px; background-color: rgb(255, 255, 255);">
        <!-- <i class="bi bi-person-fill" style="font-size: 5rem; "></i> -->
         <img class="" src="./svgs/line-md--person-filled.svg"  style="width: 70px; height: 70px; ">
        <i class="" style="font-size: 5rem; "></i>
    </div>

    <h1 class="h2 mb-5 mt-2 fw-normal text-white ">ورود</h1>


        <div class="form-floating text-danger  ">
        <input type="tel" class="form-control text-danger border border-1 border-danger" id="floatingInput" placeholder="name@example.com" style="border-radius: 10px;">
        <label for="floatingInput">شماره مبایل</label>
        </div>

        <div class="form-floating text-danger  mt-4">
        <input type="password" class="form-control text-danger border border-1 border-danger" id="floatingPassword" placeholder="Password" style="border-radius: 10px;">
        <label for="floatingPassword">رمز عبور</label>
        </div>

  

    <div class="checkbox text-end me-3 text-white my-3">
      <label>
        <input type="checkbox" class="checkbox-custom"  value="remember-me"> مرا به یاد داشته باش
      </label>
    </div>
    <button class="w-100 btn btn-lg text-white " style="background-color: #e93111e1 ; border-radius: 10px;" type="submit">ورود</button>
    <p class="mt-3 mb-3 text-white">اگر هنوز ثبت نام نکرده اید <a href="" class="fw-bold">ثبت نام </a>کنید </p>
  </form>
</main>
  <script src="./login.js"></script>
</body>
</html>
